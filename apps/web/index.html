<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kotoba-gym</title>
  </head>
  <body>
    <main id="app">
      <section class="practice-shell" aria-labelledby="title">
        <header class="topbar">
          <div>
            <p class="eyebrow">kotoba-gym Phase 0b</p>
            <h1 id="title">PM 1on1 音声練習</h1>
          </div>
          <div class="session-tools">
            <select id="topicSelect" aria-label="お題"></select>
            <button id="newSessionButton" type="button">新しく始める</button>
          </div>
        </header>

        <section class="conversation" aria-live="polite">
          <div class="pm-area">
            <span class="speaker-label">PM</span>
            <p id="pmText">セッションを準備しています。</p>
          </div>
          <div class="user-area">
            <span class="speaker-label">あなた</span>
            <p id="userText">マイクを押して話してください。</p>
          </div>
        </section>

        <section class="control-surface" aria-label="録音操作">
          <button
            id="micButton"
            class="mic-button"
            type="button"
            aria-pressed="false"
          >
            <span class="mic-mark" aria-hidden="true"></span>
            <span id="micLabel">録音する</span>
          </button>
          <div class="status-grid">
            <div>
              <span>状態</span>
              <strong id="statusText">準備中</strong>
            </div>
            <div>
              <span>ターン</span>
              <strong id="turnText">0 / 0</strong>
            </div>
            <div>
              <span>初回発声</span>
              <strong id="latencyText">--</strong>
            </div>
          </div>
        </section>

        <section class="details">
          <div>
            <h2>チェックリスト</h2>
            <ul id="checklist" class="checklist"></ul>
          </div>
          <div>
            <h2>音響観察</h2>
            <ul id="observations" class="observations"></ul>
          </div>
        </section>

        <section id="feedbackPanel" class="feedback" hidden>
          <h2>フィードバック</h2>
          <div id="feedbackText"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
